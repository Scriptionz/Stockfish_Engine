# --- LICHESS BAĞLANTI AYARLARI ---
token: "$LICHESS_TOKEN"
url: "https://lichess.org/"

# --- MOTOR (UCI) AYARLARI ---
engine:
  dir: "./src/"
  name: "Ethereal"
  protocol: "uci"
  uci_options:
    Threads: 2            # İşlemciyi boğmadan performans almak için 2 idealdir
    Hash: 512
    MoveOverhead: 350     # 500ms bullet için çok yüksekti, 100ms güvenli hıza çekildi
    Ponder: true          # Akıllı Pondering özelliği için aktif edildi
    SyzygyPath: "./syzygy"
    SyzygyProbeDepth: 1

# --- SOSYAL AYARLAR (CHAT) ---
chat:
  welcome: "Hi! Void 6 active. Advanced Pondering & Local Tablebase enabled. Good luck!"
  goodbye: "GG! Thanks for the game. Let's analyze later if you want!"

# --- LICHESS TAKIM AYARLARI ---
teams:
  priority_mode: true     # Botun eklendiği takımlardan gelen isteklere öncelik ver
  allowed_teams:
    - "lichess-bots"
    - "computer-chess-club"

# --- SAVAŞ MODU (GELEN MEYDAN OKUMALAR) ---
challenge_policy:
  accept_bot: true
  accept_human: true
  rated: true
  time_controls:
    - bullet
    - blitz
    - rapid
    - classical
  min_time: 30            # Hyperbullet (30s) maçları da kabul edebilmesi için düşürüldü
  max_time: 2000

# --- MATCHMAKING & TURNUVA (HYBRID) ---
matchmaking:
  allow_feed: true
  challenge_interval: 60
  challenge_timeout: 30
  max_games: 2
  
  # --- Turnuva Ayarları ---
  auto_tournament: true
  join_upcoming_mins: 15
  only_bot_tourneys: false # Takım turnuvalarında insanlarla da oynayabilmesi için esnetildi
  
  # --- ELO KORUMA FİLTRESİ ---
  opponent_min_rating: 1500
  opponent_max_rating: 4000
  opponent_rating_difference: 700

  time_controls:
    - "1+0"
    - "1+1"
    - "2+1"
    - "3+0"
    - "3+2"
    - "5+0"
    - "5+2"
    - "10+0"
    - "10+2"
    
  challenge_bots: true
  challenge_humans: true   # Takım arkadaşlarından gelen istekler için aktif
  selection: "random"
