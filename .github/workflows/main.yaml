name: Void Lichess Bot

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: # Manuel başlatma
  schedule:
    - cron: '0 */6 * * *' # Her 6 saatte bir otomatik başlar

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v5 # v4 yerine en güncel v5 sürümüne yükselttim
        with:
          python-version: '3.10'

      # 🛠️ GÜVENLİ KİTAP ADIMI: Eğer Void'de kitap kullanmıyorsan bu adımı komple silebilirsin!
      - name: Açılış Kitabını Kur (Eğer Void de kullanacaksa)
        run: |
          # Eğer projenin ana dizininde zaten bir book.bin varsa hata vermemesi için koruma ekledik
          if [ -f "book.bin" ]; then
            echo "✅ Kitap zaten ana dizinde mevcut."
          else
            echo "📚 Kitap bulunamadı, config.yml'de 'opening_books: enabled: false' olduğundan emin ol."
          fi

      - name: Stockfish 18 Motorunu Kur (Garantili Link)
        run: |
          echo "🌌 VOID uyanıyor: Doğrudan bağlantı kuruldu..."
          
          # 1. Klasör hazırlığı
          mkdir -p src
          
          # 2. Resmi Stockfish linkiyle indirme
          wget -q --show-progress "https://github.com/official-stockfish/Stockfish/releases/download/sf_18/stockfish-ubuntu-x86-64-avx2.tar" -O sf18.tar
          
          # 3. Paketi aç
          tar -xvf sf18.tar
          
          # 4. Motoru bul ve 'Ethereal' olarak maskele
          find . -maxdepth 3 -type f -name "stockfish-ubuntu-x86-64-avx2" -exec mv {} ./src/Ethereal \;
          
          # 5. İzinleri ver ve test et
          chmod +x ./src/Ethereal
          echo "✅ Motor başarıyla kuruldu ve maskelendi."
          ./src/Ethereal uci | grep "Stockfish 18"

      - name: Kutuphaneleri Kur
        run: |
          pip install -r requirements.txt

      - name: Motor Test (UCI Testi)
        run: |
          chmod +x ./src/Ethereal
          echo "uci" | ./src/Ethereal | grep "uciok" || (echo "MOTOR CALISMIYOR!" && exit 1)

      - name: Botu Baslat
        env:
          LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
        run: |
          # Config dosyasındaki token yer tutucusunu güncelle
          sed -i "s/\$LICHESS_TOKEN/$LICHESS_TOKEN/g" config.yml || echo "Config hatasi!"
          # Botu başlat
          python -u lichess-bot.py
